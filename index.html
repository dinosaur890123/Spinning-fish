<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FISH!!!</title> 
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="dash">
        <div>Fish RPM: <span id="rpm">0</span></div>
        <div>G-Force: <span id="gf">0</span>G</div>
        <div>Synergy: <span id="syn">0</span>%</div>
    </div>

    <div id="shop">
        <strong>Spin Shop</strong><br>
        <button id="button-gold" onclick="buyItem(50, 'gold')" disabled>Gold Fish (50)</button>
        <button id="button-speed" onclick="buyItem(150, 'speed')" disabled>Hyper Speed (150)</button>
        <button id="button-scam" onclick="buyItem(500, 'scam')" disabled>Mystery (500)</button>
    </div>

    <img id="fish" src="fish.jpg" alt="Fish">
    <button class="toggle-button" onclick="document.getElementById('fish').classList.toggle('spin')">Spin the fish!</button>

    <div class="ai">
        <strong style="color:black">FishAI™</strong>
        <div id="ai-message" style="font-size: 12px; margin: 8px 0; color: #656262; max-width: 140px;">How can I help with your fish?</div>
        <input id="ai-in" type="text" placeholder="Message..." style="width: 90px;">
        <button id="ai-button" onclick="askFishAI()">Ask</button>
    </div>
</body>
</html>
<script src="script.js"></script>
